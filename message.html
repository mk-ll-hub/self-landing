<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scape</title>

    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/mobile.css">
    <link rel="stylesheet" href="style/message.css">
    
    <link rel="icon" href="img/Frame 3.svg" type="image/svg+xml">
    <link rel="icon" href="img/Frame 3.svg" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="img/Frame 3.svg">


    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">



</head>
<body>

    <canvas id="bg"></canvas>

    <header class="head" >
        <div class="header_down">
            <img src="img/Frame 2 (2).png" alt="" class="logo">
        </div>

        <div class="header_left">
            <a href="" data-scroll-to="#block9" class="to-top">Наверх</a>

            <a href="index.html" class="home">Главная</a>
            

        </div>
    </header>

<div class="knopka">
    <button class="contactus2" >
        <img src="img/paper-plane (1).png" alt="" class="contactus2icon">
    </button>
</div>

    <section class="contact-section" id="block9">
        <form class="contact-form" id="contactForm">

    <!-- 1. Имя (необязательно) -->
        <div class="form-group">
            <label for="name" class="label">Имя (необязательно)</label>
            <input 
                type="text" 
                id="name" 
                name="name"
                placeholder="Ваше имя"
            >
        </div>

    <!-- 2. Почта (обязательно) -->
        <div class="form-group">
            <label for="email" class="label">Email *</label>
            <input 
                type="email" 
                id="email" 
                name="email"
                placeholder="example@mail.com"
                required
            >
        </div>

    <!-- 3. Сообщение (обязательно, растягивается) -->
        <div class="form-group">
            <label for="message" class="label">Сообщение *</label>
            <textarea 
                id="message" 
                name="message"
                placeholder="Напишите ваш вопрос..."
                required
            ></textarea>
        </div>

        <button type="submit" class="submit-btn">
            Отправить
        </button>

        <div class="socialsblock">
            <div class="textblock">
                <p class="label1">Наши соцсети</p>
            </div>
            <div class="linksblock">
                <a href="" class="tg">
                    <img src="img/telegram.png" alt="" class="tgicon">
                </a>
                <a href="" class="tg">
                    <img src="img/instagram-circle.png" alt="" class="tgicon">
                </a>
            </div>
        </div>

    </form>
</section>

    <footer class="footer">
        <div class="ftrcont1">
            <div class="ftr1">
                <img src="img/Frame 2 (2).png" alt="" class="logoftr">
                <p class="caption">Scape – удобно, быстро, профессионально.</p>
                
            </div>
            <div class="ftr2">
                <div class="column">
                    <h3>Навигация</h3>
                    <a href="" data-scroll-to="#block9" class="links">Письмо нам</a>
                </div>

                <div class="column">
                    <h3>Страницы</h3>
                    <a href="index.html"class="links">Главная</a>
                    <a href="message.html"class="links">Почта</a>
                    <a href="#"class="links">ИИ Ассистент</a>
                    <a href="#"class="links">404</a>
                </div>

                <div class="column">
                    <h3>Контакты</h3>
                    <a href="#"class="links">Instagram</a>
                    <a href="#"class="links">Telegram</a>
                </div>
            </div>
        </div>
        <div class="ftrcont2">
            <p class="last">© 2026 Scape. All rights reserved.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="script/message.js"></script>



</body>
</html>
